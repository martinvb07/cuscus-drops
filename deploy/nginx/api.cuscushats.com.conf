# ─── api.cuscushats.com (Backend Node.js) ────────────────────────────────────────
server {
    listen 80;
    server_name api.cuscushats.com;
    return 301 https://api.cuscushats.com$request_uri;
}

server {
    listen 443 ssl;
    server_name api.cuscushats.com;

    ssl_certificate     /etc/letsencrypt/live/api.cuscushats.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.cuscushats.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
