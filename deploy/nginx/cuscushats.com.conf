# ─── cuscushats.com (Frontend Next.js) ───────────────────────────────────────────
# Redirige HTTP → HTTPS
server {
    listen 80;
    server_name cuscushats.com www.cuscushats.com;
    return 301 https://cuscushats.com$request_uri;
}

# Redirige www → sin www (HTTPS)
server {
    listen 443 ssl;
    server_name www.cuscushats.com;
    ssl_certificate     /etc/letsencrypt/live/cuscushats.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cuscushats.com/privkey.pem;
    return 301 https://cuscushats.com$request_uri;
}

# HTTPS principal
server {
    listen 443 ssl;
    server_name cuscushats.com;

    ssl_certificate     /etc/letsencrypt/live/cuscushats.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cuscushats.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
